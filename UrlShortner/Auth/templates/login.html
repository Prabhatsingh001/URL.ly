{% extends "layout.html" %}
{% load static %}

{% block title %}Login | URL.ly{% endblock %}

{% block content %}
<div class="w-full flex flex-col items-center pt-24 pb-24 px-4 min-h-[calc(100vh-100px)]">
    <div
        class="flex bg-white rounded-2xl shadow-md border border-gray-100 overflow-hidden w-full mx-auto max-w-sm lg:max-w-4xl m-4 md:m-10">
        <div class="hidden lg:block lg:w-1/2 bg-contain bg-center bg-no-repeat bg-white"
            style="background-image:url('{% static 'signin-image.webp' %}')">
        </div>
        <div class="w-full p-6 sm:p-12 lg:w-1/2 bg-gray-50">
            <h2 class="text-2xl font-semibold text-gray-900 text-center">
                <a href="{% url 'index' %}"
                    class="flex items-center justify-center mb-4 text-3xl font-bold text-gray-900">
                    <img class="w-10 h-10 mr-2" src="{% static 'logo.png' %}" alt="logo">URL.LY
                </a>
            </h2>
            <p class="text-xl text-gray-600 text-center justify-center font-bold">Welcome back!</p>

            <div class="mt-6 flex flex-col items-center">
                <button
                    class="w-full font-bold shadow-sm border border-gray-200 rounded-lg py-3 bg-white text-gray-900 flex items-center justify-center transition hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <div class="bg-white p-2 rounded-full">
                        <svg class="w-4" viewBox="0 0 533.5 544.3">
                            <path
                                d="M533.5 278.4c0-18.5-1.5-37.1-4.7-55.3H272.1v104.8h147c-6.1 33.8-25.7 63.7-54.4 82.7v68h87.7c51.5-47.4 81.1-117.4 81.1-200.2z"
                                fill="#4285f4" />
                            <path
                                d="M272.1 544.3c73.4 0 135.3-24.1 180.4-65.7l-87.7-68c-24.4 16.6-55.9 26-92.6 26-71 0-131.2-47.9-152.8-112.3H28.9v70.1c46.2 91.9 140.3 149.9 243.2 149.9z"
                                fill="#34a853" />
                            <path
                                d="M119.3 324.3c-11.4-33.8-11.4-70.4 0-104.2V150H28.9c-38.6 76.9-38.6 167.5 0 244.4l90.4-70.1z"
                                fill="#fbbc04" />
                            <path
                                d="M272.1 107.7c38.8-.6 76.3 14 104.4 40.8l77.7-77.7C405 24.6 339.7-.8 272.1 0 169.2 0 75.1 58 28.9 150l90.4 70.1c21.5-64.5 81.8-112.4 152.8-112.4z"
                                fill="#ea4335" />
                        </svg>
                    </div>
                    <a href="{% url 'social:begin' 'google-oauth2' %}" class="ml-4">
                        Sign In with Google
                    </a>
                </button>
            </div>

            <div class="mt-6 mb-6 border-b border-gray-300 text-center">
                <div
                    class="leading-none px-2 inline-block text-sm text-gray-500 tracking-wide font-medium bg-gray-50 transform translate-y-1/2">
                    Or login with email
                </div>
            </div>

            <form method="post">
                {% csrf_token %}

                {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
                {% endif %}

                <div class="mt-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Email Address</label>
                    <input
                        class="bg-white text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 border border-gray-300 rounded-lg py-3 px-4 block w-full appearance-none transition"
                        type="email" name="email" id="email" placeholder="Email" />
                </div>
                <div class="mt-4">
                    <div class="flex justify-between">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                        <a href="{% url 'a:forgot_password' %}" class="text-xs text-gray-500 hover:text-blue-500">Forgot
                            Password?</a>
                    </div>
                    <div class="relative">
                        <input
                            class="bg-white text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 border border-gray-300 rounded-lg py-3 px-4 block w-full appearance-none transition"
                            type="password" name="password" id="password" placeholder="Password" />
                        <span class="absolute inset-y-0 right-4 flex items-center cursor-pointer mt-0"
                            onclick="togglePasswordVisibility('password', this)">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="gray" class="w-6 h-6">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </span>
                    </div>
                </div>
                <div class="mt-8">
                    <button
                        class="w-full tracking-wide font-semibold bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition shadow-sm flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">Login</button>
                </div>
                <div class="mt-6 text-sm font-light text-gray-500 text-center">
                    Don't have an account? <a href="{% url 'a:signup' %}"
                        class="font-medium text-blue-600 hover:underline">Sign Up</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% block scripts %}
<script src="{% static 'main/js/password_visibility.js' %}"></script>
{% endblock %}
{% endblock %}
