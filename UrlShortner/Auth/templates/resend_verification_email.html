{% extends "layout.html" %}
{% load static %}

{% block title %}Mail Verification | URL.ly{% endblock %}

{% block content %}
<div class="w-full flex flex-col items-center pt-24 pb-24 px-4 min-h-[calc(100vh-100px)]">
    <div class="my-auto w-full bg-gray-100 rounded-2xl shadow-md border border-gray-100 overflow-hidden max-w-sm lg:max-w-md">
        <div class="w-full p-6 sm:p-12">
            <!-- Logo + Title -->
            <a href="{% url 'index' %}" class="flex items-center justify-center mb-6 text-3xl font-bold text-gray-800">
                <img class="w-10 h-10 mr-2" src="{% static 'logo.png' %}" alt="logo">URL.LY
            </a>

            <!-- Heading -->
            <h1 class="text-center font-bold text-gray-800 text-xl mb-6">Resend Verification Email</h1>

            <!-- Form -->
            <form action="{% url 'a:resend-verification-email' email=email %}" method="post" class="space-y-4">
                {% csrf_token %}

                <!-- Email Field -->
                <div>
                    <label for="email" class="block text-gray-700 text-sm font-bold mb-2">Email Address</label>
                    <input type="email" name="email" id="email" value="{{ email }}" readonly
                        class="bg-gray-50 text-gray-500 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 border border-gray-300 rounded-lg py-3 px-4 block w-full appearance-none transition cursor-not-allowed">
                </div>

                <p class="text-sm text-center text-gray-600 mb-2">If you haven't received the verification email, you can resend it.</p>
                <div id="timerDisplay" class="text-sm font-medium text-center text-gray-700 mb-4"></div>

                <!-- Button -->
                <div class="mt-6">
                    <button type="submit" disabled id="mybuttonId"
                        class="w-full tracking-wide font-semibold bg-gray-900 text-gray-50 py-3 rounded-lg hover:bg-black transition shadow-sm flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-2 disabled:bg-gray-400 disabled:cursor-not-allowed">
                        Resend Verification Email
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'main/js/resend_verification_email.js' %}"></script>
{% endblock %}
