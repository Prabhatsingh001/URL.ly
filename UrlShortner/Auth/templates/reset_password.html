{% extends "layout.html" %}
{% load static %}

{% block title %}Reset Password | URL.ly{% endblock %}

{% block content %}
<div class="w-full flex flex-col items-center pt-24 pb-24 px-4 min-h-[calc(100vh-100px)]">
    <a href="#" class="flex items-center justify-center mb-6 text-3xl font-bold text-gray-800">
        <img class="w-10 h-10 mr-2" src="{% static 'logo.png' %}" alt="logo">URL.LY
    </a>
    <div class="my-auto w-full bg-gray-100 rounded-2xl shadow-md border border-gray-100 overflow-hidden sm:max-w-md">
        <div class="p-6 sm:p-12">
            <form method="post">
                {% csrf_token %}
                <h1 class="text-center font-bold text-gray-800 text-xl mb-6">Create New Password</h1>
                <p class="text-center text-gray-600 mb-6 text-sm">Your new password must be different from previously
                    used passwords.</p>

                <div class="mt-4 relative">
                    <label for="password" class="block text-gray-700 text-sm font-bold mb-2">New Password</label>
                    <input type="password" name="password" id="password" placeholder="New Password"
                        class="bg-gray-50 text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 border border-gray-300 rounded-lg py-3 px-4 block w-full appearance-none transition">
                    <span class="absolute inset-y-0 right-4 flex items-center cursor-pointer mt-7"
                        onclick="togglePasswordVisibility('password', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="gray" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                    </span>
                </div>
                <div class="mt-4 relative">
                    <label for="confirm-password" class="block text-gray-700 text-sm font-bold mb-2">Confirm New
                        Password</label>
                    <input type="password" name="confirm-password" id="confirm-password"
                        placeholder="Confirm New Password"
                        class="bg-gray-50 text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 border border-gray-300 rounded-lg py-3 px-4 block w-full appearance-none transition">
                    <span class="absolute inset-y-0 right-4 flex items-center cursor-pointer mt-7"
                        onclick="togglePasswordVisibility('confirm-password', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="gray" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                    </span>
                </div>
                <div class="mt-6">
                    <button type="submit"
                        class="w-full tracking-wide font-semibold bg-gray-900 text-gray-50 py-3 rounded-lg hover:bg-black transition shadow-sm flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-2">
                        Reset Password
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'main/js/password_visibility.js' %}"></script>
{% endblock %}
