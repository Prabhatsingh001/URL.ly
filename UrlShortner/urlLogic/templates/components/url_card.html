<!-- CARD START -->
<div class="relative bg-white border border-gray-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow duration-300 flex flex-col gap-8 overflow-hidden">


  <!-- URL Info Section -->
  <div class="relative z-10 space-y-6">
    <!-- Original URL -->
    <div class="space-y-3">
      <div class="flex items-center gap-2">
        <div class="p-2 bg-blue-50 rounded-lg">
          <svg class="h-4 w-4 text-blue-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
          </svg>
        </div>
        <p class="text-sm font-bold text-gray-700 tracking-wide">ORIGINAL URL</p>
      </div>
      <div class="bg-gray-50 rounded-xl p-4 border border-gray-200">
        <p class="text-blue-600 break-words text-sm leading-relaxed font-medium">{{ url.original_url }}</p>
      </div>
    </div>

    <!-- Short URL -->
    <div class="space-y-3">
      <div class="flex items-center gap-2">
        <div class="p-2 bg-emerald-50 rounded-lg">
          <svg class="h-4 w-4 text-emerald-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 010 5.656l-3.535 3.535a4 4 0 01-5.656-5.656l1.414-1.414"/>
          </svg>
        </div>
        <p class="text-sm font-bold text-gray-700 tracking-wide">SHORT URL</p>
      </div>

      <div class="group/url bg-gray-50 border border-gray-200 rounded-xl p-4 transition-all duration-300">
        <div class="flex items-center justify-between gap-3">
          <a href="{{ request.scheme }}://{{ request.get_host }}/u/{{ url.short_url }}/"
             class="text-emerald-700 hover:text-emerald-800 underline decoration-2 underline-offset-2 break-all text-sm font-semibold flex-1 transition-colors duration-200"
             target="_blank">
            {{ request.scheme }}://{{ request.get_host }}/u/{{ url.short_url }}/
          </a>
          <button
            onClick="copyUrl(this)"
            class="group/copy p-2.5 bg-white hover:bg-emerald-50 rounded-lg border border-gray-200 shadow-sm transition-colors duration-200"
            title="Copy to clipboard"
            data-url="{{ request.scheme }}://{{ request.get_host }}/u/{{ url.short_url }}/">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-600 group-hover/copy:text-emerald-600 transition-colors duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
          </button>
        </div>
      </div>
      
      <div class="flex items-center gap-2 text-xs">
        <div class="w-2 h-2 bg-blue-500 rounded-full"></div>
        <p class="text-gray-500 font-medium">Created {{ url.created_at|date:"M d, Y" }}</p>
      </div>
    </div>
  </div>

  <!-- Enhanced Toast Message with better positioning -->
  <div id="toast" class="hidden fixed bottom-8 left-1/2 transform -translate-x-1/2 z-50 px-6 py-3 rounded-2xl shadow-sm text-sm font-semibold -lg border transition-all duration-500 ease-out"></div>

  <!-- QR Code Section -->
  <div class="relative z-10">
    {% if url.qrcode %}
    <div class="flex flex-col items-center">
      <div>
        <div class="inline-block p-4 bg-gray-50 rounded-xl border border-gray-200">
          <img src="{{ url.qrcode.url }}" alt="QR Code"
               class="w-48 h-48 mx-auto rounded-lg">
          <p class="mt-3 text-xs font-medium text-gray-500 tracking-wide">QR CODE</p>
        </div>
      </div>
      
      <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-2">
        <a href="{% url 'u:download_qr' url.id %}"
          class="group/qr mt-4 inline-flex items-center gap-2 px-4 py-2 bg-blue-50 hover:bg-indigo-100 text-indigo-500 rounded-lg border border-indigo-200 transition-colors duration-200 font-semibold text-sm">
          <svg class="w-4 h-4"
            fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
          </svg>
          Download QR
        </a>

        <a href="{% url 'u:mail_qr' url.id %}"
          class="group/qr mt-4 inline-flex items-center gap-2 px-4 py-2 bg-blue-50 hover:bg-indigo-100 text-indigo-500 rounded-lg border border-indigo-200 transition-colors duration-200 font-semibold text-sm">
          <svg class="w-4 h-4"
                fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
          </svg>
          Mail QR
        </a>
      </div>
    </div>
    {% else %}
      <div class="flex justify-center">
        <form method="post" action="{% url 'u:generate_qr' %}">
          {% csrf_token %}
          <input type="hidden" name="id" value="{{ url.id }}">
          <button type="submit"
                  class="group/qr inline-flex items-center gap-2 px-6 py-2 bg-blue-50 hover:bg-indigo-100 text-indigo-500 rounded-lg border border-indigo-200 transition-colors duration-200 font-semibold text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
            </svg>
            Generate QR
          </button>
        </form>
      </div>
    {% endif %}
      <div class="flex justify-center mt-4">
        <form method="post" action="{% url 'u:analytics_dashboard' url.id %}">
          {% csrf_token %}
          <button type="submit"
                  class="group/qr inline-flex items-center gap-2 px-6 py-2 bg-blue-50 hover:bg-indigo-100 text-indigo-500 rounded-lg border border-indigo-200 transition-colors duration-200 font-semibold text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18 9 11.25l4.306 4.306a11.95 11.95 0 0 1 5.814-5.518l2.74-1.22m0 0-5.94-2.281m5.94 2.28-2.28 5.941" />
                </svg>
              View Analytics
          </button>
        </form>
      </div>
  </div>

  <!-- Action Buttons -->
  <div class="relative z-10 flex justify-center gap-6 pt-6 border-t border-gray-200">
    <a href="{% url 'u:edit_url' url.id %}"
       class="group/edit flex items-center justify-center w-10 h-10 bg-blue-50 hover:bg-blue-100 rounded-lg border border-blue-200 transition-colors duration-300"
       title="Edit URL">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7m-5.5-9.5l-7 7V16h2l7-7m0 0l3-3a2 2 0 00-3-3l-3 3z" />
      </svg>
    </a>

    <form method="post" action="{% url 'u:delete_url' url.id %}" class="inline-block">
      {% csrf_token %}
      <button type="submit"
              class="group/delete flex items-center justify-center w-10 h-10 bg-red-50 hover:bg-red-50 rounded-lg border border-red-200 transition-colors duration-300"
              title="Delete URL">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1-1H9a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      </button>
    </form>
  </div>
</div>
<!-- CARD END -->
