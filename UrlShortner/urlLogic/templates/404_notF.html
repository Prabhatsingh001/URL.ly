{% load static %}
{% if debug %}
    {% load static tailwind_tags %}
{% endif %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Page Not Found — URL.LY</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    {% if debug %}
        {% tailwind_css %}
    {% else %}
        <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}">
    {% endif %}
</head>
<body class="min-h-screen flex flex-col items-center justify-center bg-gray-50 text-gray-900 relative overflow-hidden" style="background-image: radial-gradient(circle, #e5e7eb 1px, transparent 1px); background-size: 24px 24px;">
    <main class="flex flex-col md:flex-row items-center justify-center text-center md:text-left px-6 py-16 gap-12 md:gap-20 w-full max-w-6xl mx-auto">
        <div class="flex flex-col items-center md:items-start space-y-6 flex-1">
            <h1 class="font-black tracking-tight text-blue-500"
                style="font-size: clamp(3rem, 6vw, 5rem);">
                404
            </h1>

            <h2 class="font-semibold text-gray-800"
                style="font-size: clamp(1.25rem, 2.5vw, 2rem);">
                Oops! Page not found
            </h2>

            <p class="text-gray-600 leading-relaxed max-w-md"
            style="font-size: clamp(0.9rem, 1.5vw, 1.1rem);">
                The page you’re trying to reach doesn’t exist or has been moved.<br>
                <span>Let’s get you back on track.</span>
            </p>

            <a href="/" 
            class="inline-block bg-blue-500 hover:bg-blue-600 text-white font-semibold px-8 py-3 rounded-xl shadow-sm transition-colors duration-200"
            style="font-size: clamp(0.9rem, 1.3vw, 1.05rem);">
                Return Home
            </a>
        </div>
        <div class="flex-1 flex justify-center md:justify-end">
            <img src="{% static '404_not_found.svg' %}" 
                alt="404 Illustration" 
                class="w-[60vw] md:w-[40vw] lg:w-[30vw] max-w-sm md:max-w-md lg:max-w-lg object-contain">
        </div>
    </main>
</body>
</html>
